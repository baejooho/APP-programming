<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냉장고 재료 인식</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🧊 냉장고 재료 인식</h1>
      <p class="subtitle">냉장고 사진을 올리면 AI가 재료를 자동으로 찾아드립니다</p>
    </header>

    <!-- 업로드 영역 -->
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden />
      <div class="upload-placeholder" id="uploadPlaceholder">
        <div class="upload-icon">📷</div>
        <p>사진을 드래그하거나 <button class="link-btn" id="browseBtn">파일 선택</button></p>
        <span class="upload-hint">JPG · PNG · WEBP · 최대 10MB</span>
      </div>
      <div class="preview-wrap" id="previewWrap" hidden>
        <img id="previewImg" src="" alt="미리보기" />
        <button class="remove-img-btn" id="removeImgBtn" title="이미지 제거">✕</button>
      </div>
    </div>

    <!-- 인식 버튼 -->
    <button class="btn btn-primary" id="recognizeBtn" disabled>
      <span id="recognizeBtnText">재료 인식하기</span>
      <span class="spinner" id="spinner" hidden></span>
    </button>

    <!-- 오류 메시지 -->
    <div class="error-box" id="errorBox" hidden></div>

    <!-- 재료 결과 -->
    <section class="result-section" id="resultSection" hidden>
      <h2>인식된 재료</h2>
      <div class="tags" id="tagsContainer"></div>

      <div class="add-ingredient">
        <input type="text" id="addInput" placeholder="재료 직접 추가..." maxlength="20" />
        <button class="btn btn-secondary" id="addBtn">추가</button>
      </div>

      <button class="btn btn-success" id="nextBtn">
        레시피 추천받기 →
      </button>
    </section>
  </div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav">
    <a href="/" class="active">🧊 재료 인식</a>
    <a href="/recipe.html">🍳 레시피</a>
    <a href="/profile.html">👤 마이 레시피</a>
  </nav>

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
